services:
  # ── Backend: Node.js API ────────────────────────────────────────────────────
  - type: web
    name: voice-backend
    runtime: node
    rootDir: backend-node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: legal_guardian
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: legal.eagle.gurgaon@gmail.com
      - key: FRONTEND_URL
        value: https://medicalnegligance.netlify.app
      - key: CORS_ORIGINS
        value: https://medicalnegligance.netlify.app
