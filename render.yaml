services:
  # ── Backend: Node.js API ────────────────────────────────────────────────────
  - type: web
    name: voice-backend
    runtime: node
    rootDir: backend-node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false          # paste your MongoDB Atlas URI in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: SMTP_USER
        sync: false          # legal.eagle.gurgaon@gmail.com
      - key: SMTP_PASS
        sync: false          # your Gmail App Password
      - key: ADMIN_EMAIL
        value: legal.eagle.gurgaon@gmail.com
      - key: FRONTEND_URL
        fromService:
          name: voice-frontend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        fromService:
          name: voice-frontend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend: React / Vite static site ─────────────────────────────────────
  - type: web
    name: voice-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: voice-backend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # SPA fallback — send all routes to index.html
      - type: rewrite
        source: /*
        destination: /index.html
